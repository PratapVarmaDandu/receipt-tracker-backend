# ────────────────────────────────────────────────────────────────────────────────
# PRODUCTION ENVIRONMENT CONFIGURATION
# ────────────────────────────────────────────────────────────────────────────────

# ── Production Database (from env vars) ──────────────────────────────────────
spring.datasource.url=${PROD_DB_URL:?Error: PROD_DB_URL environment variable required in production}
spring.datasource.username=${PROD_DB_USER:?Error: PROD_DB_USER environment variable required in production}
spring.datasource.password=${PROD_DB_PASSWORD:?Error: PROD_DB_PASSWORD environment variable required in production}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate

# ── Production Frontend URL (from env vars) ──────────────────────────────────
app.frontend.url=${FRONTEND_URL:?Error: FRONTEND_URL environment variable required in production}

# ── Production API Configuration ─────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.http-only=true

# ── Production OAuth2 (from env vars) ────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:?Error: GOOGLE_CLIENT_ID required in production}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:?Error: GOOGLE_CLIENT_SECRET required in production}

# ── Production Logging (reduced verbosity) ──────────────────────────────────
logging.level.root=WARN
logging.level.com.receipttracker=INFO
logging.level.org.springframework.security=WARN

# ── Upload Directory ────────────────────────────────────────────────────────
upload.dir=${UPLOAD_DIR:/var/uploads}

# ── Tesseract OCR Path ──────────────────────────────────────────────────────
tesseract.data.path=${TESSDATA_PATH:/usr/share/tessdata}

