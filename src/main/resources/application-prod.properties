# ────────────────────────────────────────────────────────────────────────────────
# PRODUCTION ENVIRONMENT CONFIGURATION (Oracle Cloud / Docker Compose)
# All values are injected via environment variables — never hardcode secrets here.
# ────────────────────────────────────────────────────────────────────────────────

# ── Production Database ───────────────────────────────────────────────────────
# Full JDBC URL is supplied by the container orchestrator (docker-compose / k8s).
# Example: jdbc:mysql://mysql:3306/receipttracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=${DB_URL:?Error: DB_URL is required in production}
spring.datasource.username=${DB_USER:?Error: DB_USER is required in production}
spring.datasource.password=${DB_PASS:?Error: DB_PASS is required in production}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# ── Frontend URL (used for CORS + OAuth2 redirect allow-list) ─────────────────
app.frontend.url=${FRONTEND_URL:?Error: FRONTEND_URL is required in production}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.http-only=true

# ── Google OAuth2 ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:?Error: GOOGLE_CLIENT_ID required in production}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:?Error: GOOGLE_CLIENT_SECRET required in production}

# ── Logging (reduced verbosity in production) ─────────────────────────────────
logging.level.root=WARN
logging.level.com.receipttracker=INFO
logging.level.org.springframework.security=WARN

# ── File Uploads ──────────────────────────────────────────────────────────────
upload.dir=${UPLOAD_DIR:/app/uploads}

# ── Tesseract OCR ─────────────────────────────────────────────────────────────
tesseract.data.path=${TESSDATA_PATH:/usr/share/tessdata}

# ── Credential Encryption ─────────────────────────────────────────────────────
encryption.secret=${ENCRYPTION_SECRET:?Error: ENCRYPTION_SECRET required in production}

# ── Claude Vision AI (optional) ───────────────────────────────────────────────
vision.ai.enabled=${VISION_AI_ENABLED:false}
vision.ai.api-key=${ANTHROPIC_API_KEY:}
vision.ai.model=${VISION_AI_MODEL:claude-sonnet-4-6}
vision.ai.max-pdf-pages=${VISION_AI_MAX_PDF_PAGES:5}
vision.ai.pdf-dpi=${VISION_AI_PDF_DPI:150}
vision.ai.timeout-seconds=${VISION_AI_TIMEOUT_SECONDS:60}
