# ────────────────────────────────────────────────────────────────────────────────
# TEST ENVIRONMENT CONFIGURATION
# ────────────────────────────────────────────────────────────────────────────────

# ── MySQL Database for Testing ───────────────────────────────────────────────
spring.datasource.url=${TEST_DB_URL:jdbc:mysql://127.0.0.1:3306/receipttracker_test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${TEST_DB_USER:root}
spring.datasource.password=${TEST_DB_PASSWORD:admin}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop

# ── Frontend URL ─────────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ── Session & Security ───────────────────────────────────────────────────────
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=Lax

# ── OAuth2 for Testing ───────────────────────────────────────────────────────
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET env vars before running.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ── H2 Console ───────────────────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.receipttracker=INFO

