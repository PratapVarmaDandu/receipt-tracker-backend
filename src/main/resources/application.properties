spring.application.name=receipt-tracker

# ── Database Configuration ──────────────────────────────────────────────────────
# Profile-specific configuration (see application-local.properties, application-test.properties, application-prod.properties)
# Default to MySQL for non-local profiles
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/receipttracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── File upload limits ─────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
upload.dir=${UPLOAD_DIR:uploads}

# ── Tesseract OCR ──────────────────────────────────────────────────────────────
# Docker image installs to /usr/share/tessdata (Debian/Ubuntu)
# Local macOS Homebrew Apple Silicon: /opt/homebrew/share/tessdata
# Local macOS Homebrew Intel:         /usr/local/share/tessdata
tesseract.data.path=${TESSDATA_PATH:/opt/homebrew/share/tessdata}

server.port=${PORT:8080}

# Session cookie
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# ── Allowed frontend origin (CORS + OAuth2 redirect) ──────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ── Gmail / Google OAuth2 ──────────────────────────────────────────────────────
# HOW TO SET UP (one-time, ~5 minutes):
#  1. Open https://console.cloud.google.com/ and create a project
#  2. APIs & Services → Enable APIs → enable "Google People API"
#  3. APIs & Services → Credentials → Create → OAuth 2.0 Client ID
#  4. Application type: Web application
#  5. Authorized redirect URIs → add BOTH:
#       http://localhost:8080/login/oauth2/code/google      (local dev)
#       https://your-backend.railway.app/login/oauth2/code/google  (production)
#  6. Copy the Client ID and Client Secret below OR set as env vars
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ── Application Logging ───────────────────────────────────────────────────────
# Controls log verbosity for com.receipttracker.*
# Values: OFF | ERROR | WARN | INFO | DEBUG | TRACE
# Override with env var: APP_LOG_LEVEL=DEBUG
# Or change the value here directly (INFO for normal use, DEBUG for troubleshooting)
logging.level.com.receipttracker=${APP_LOG_LEVEL:INFO}

# ── Storage Credential Encryption ────────────────────────────────────────────
# IMPORTANT: Set ENCRYPTION_SECRET to a strong random value in production.
# AWS credentials stored in the DB are AES-256-GCM encrypted using this key.
encryption.secret=${ENCRYPTION_SECRET:change-this-secret-before-going-to-production}

# ── Claude Vision AI ──────────────────────────────────────────────────────────
vision.ai.enabled=${VISION_AI_ENABLED:false}
vision.ai.api-key=${ANTHROPIC_API_KEY:}
vision.ai.model=${VISION_AI_MODEL:claude-sonnet-4-6}
vision.ai.max-pdf-pages=${VISION_AI_MAX_PDF_PAGES:5}
vision.ai.pdf-dpi=${VISION_AI_PDF_DPI:150}
vision.ai.timeout-seconds=${VISION_AI_TIMEOUT_SECONDS:60}
