# ────────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT CONFIGURATION
# ────────────────────────────────────────────────────────────────────────────────

# ── H2 File-Based Database (persists across restarts — data stored in ./data/dev-db.mv.db) ──
spring.datasource.url=jdbc:h2:file:./data/dev-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# ── H2 Console ───────────────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Frontend URL ─────────────────────────────────────────────────────────────
app.frontend.url=http://localhost:4200

# ── OAuth2 Configuration ────────────────────────────────────────────────────
# Set these in backend/local.env (never commit that file).
# Copy backend/local.env.example → backend/local.env and fill in your values.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ── Session & Security ───────────────────────────────────────────────────────
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=Lax

# ── Vision AI (local dev) ─────────────────────────────────────────────────────
vision.ai.enabled=true
# Set ANTHROPIC_API_KEY env var before starting: export ANTHROPIC_API_KEY=sk-ant-...

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.receipttracker=DEBUG
logging.level.com.receipttracker.service.ClaudeVisionService=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# Feature gating off in local dev — the mock dev user has no orgs
features.gating.enabled=false
